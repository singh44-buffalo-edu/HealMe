# XcodeGen spec for the HealMeDaily iOS app.
# Generate the project with:  xcodegen generate  (run from this directory)
# The .xcodeproj is generated output and stays gitignored — this file is the
# source of truth for targets, Info.plist keys and build settings.
name: HealMeDaily
options:
  bundleIdPrefix: com.healmedaily
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  HealMeDailyKit:
    path: HealMeDailyKit

targets:
  HealMeDaily:
    type: application
    platform: iOS
    sources:
      - path: HealMeDaily
    dependencies:
      - package: HealMeDailyKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healmedaily.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1" # iPhone (the design handoff is phone-first)
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # Signing is intentionally unset here: put your Apple Developer team
        # id in Signing & Capabilities (or an .xcconfig) — see ../APPSTORE.md.
        CODE_SIGN_STYLE: Automatic
    info:
      path: HealMeDaily/Info.plist
      properties:
        CFBundleDisplayName: HealMeDaily
        # Explicit $(VAR) references: without them XcodeGen writes literal
        # "1.0"/"1" into the plist and the MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION bumps above never reach the bundle (App
        # Store Connect then rejects every second upload for a repeated
        # CFBundleVersion).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # ATS policy: default ATS + local-network exemption ONLY.
        # NSAllowsLocalNetworking covers the self-hosted LAN case (ATS also
        # exempts raw-IP URLs like http://192.168.1.20:8103 by design), so
        # plain HTTP works at home while any REMOTE hostname must be HTTPS —
        # deliberately, and documented in APPSTORE.md. Do not add
        # NSAllowsArbitraryLoads: it would be ignored while this key is
        # present (iOS 10+ rule) and only draws App Review scrutiny.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSCameraUsageDescription: >-
          HealMeDaily uses the camera to photograph medical documents (lab
          reports, prescriptions) so they can be added to your personal
          health record. Photos go only to your own self-hosted server.
        NSPhotoLibraryUsageDescription: >-
          HealMeDaily lets you pick existing photos of medical documents to
          add to your personal health record on your own server.
        NSFaceIDUsageDescription: >-
          HealMeDaily can require Face ID to open the app, keeping your
          health record private if someone else uses this phone.
        NSLocalNetworkUsageDescription: >-
          HealMeDaily connects to your own Medplum health-record server on
          your local network.
        # Uses only standard TLS (exempt) — no proprietary encryption.
        ITSAppUsesNonExemptEncryption: false
