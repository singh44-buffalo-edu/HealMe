# XcodeGen spec for the HealMeDaily iOS app.
# Generate the project with:  xcodegen generate  (run from this directory)
# The .xcodeproj is generated output and stays gitignored — this file is the
# source of truth for targets, Info.plist keys and build settings.
name: HealMeDaily
options:
  bundleIdPrefix: cloud.antriksh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  HealMeDailyKit:
    path: HealMeDailyKit

targets:
  HealMeDaily:
    type: application
    platform: iOS
    sources:
      - path: HealMeDaily
    dependencies:
      - package: HealMeDailyKit
    # Team id lives in Signing.xcconfig (gitignored; seeded from
    # Signing.xcconfig.example by `make ios-project`) so signing survives
    # .xcodeproj regeneration instead of being re-entered in Xcode each time.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.antriksh.healmenow
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1" # iPhone (the design handoff is phone-first)
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # Signing is intentionally unset here: put your Apple Developer team
        # id in Signing & Capabilities (or an .xcconfig) — see ../APPSTORE.md.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HealMeDaily/HealMeDaily.entitlements
    info:
      path: HealMeDaily/Info.plist
      properties:
        CFBundleDisplayName: HealMeNow
        # Explicit $(VAR) references: without them XcodeGen writes literal
        # "1.0"/"1" into the plist and the MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION bumps above never reach the bundle (App
        # Store Connect then rejects every second upload for a repeated
        # CFBundleVersion).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # ATS policy: default ATS + two narrow carve-outs, documented in
        # APPSTORE.md. (1) NSAllowsLocalNetworking covers the self-hosted
        # LAN case (RFC1918 hosts like http://192.168.1.20:8103) — note it
        # does NOT cover Tailscale's 100.64.0.0/10 CGNAT range (observed
        # 2026-07-21: ATS blocked http://100.x.y.z). (2) The ts.net
        # exception permits plain http:// to the user's own tailnet
        # MagicDNS names (healmenow-mac.tailXXXX.ts.net) — that traffic is
        # always inside the WireGuard tunnel, so the wire is encrypted even
        # though the scheme is http; Tailscale-issued TLS certs need a
        # tailnet feature toggle this setup doesn't require. Do NOT add
        # NSAllowsArbitraryLoads: broader than needed, ignored while
        # granular keys are present (iOS 10+ rule), and draws App Review
        # scrutiny.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
        NSCameraUsageDescription: >-
          HealMeNow uses the camera to photograph medical documents (lab
          reports, prescriptions) so they can be added to your personal
          health record. Photos go only to your own self-hosted server.
        NSPhotoLibraryUsageDescription: >-
          HealMeNow lets you pick existing photos of medical documents to
          add to your personal health record on your own server.
        NSFaceIDUsageDescription: >-
          HealMeNow can require Face ID to open the app, keeping your
          health record private if someone else uses this phone.
        NSLocalNetworkUsageDescription: >-
          HealMeNow connects to your own Medplum health-record server on
          your local network.
        NSHealthShareUsageDescription: >-
          HealMeNow can read steps, heart rate, HRV, sleep, weight, blood
          pressure, oxygen saturation and body temperature from Apple Health
          — only if you turn the sync on — and stores them in your own
          self-hosted health record. Nothing is shared with anyone else.
        # Required by App Store validation because HealthKit APIs are linked,
        # even though the app never writes to Apple Health (read-only sync).
        NSHealthUpdateUsageDescription: >-
          HealMeNow does not write data to Apple Health. This permission is
          never requested; the description exists only because Apple requires
          it for any app that links HealthKit.
        # Uses only standard TLS (exempt) — no proprietary encryption.
        ITSAppUsesNonExemptEncryption: false

  HealMeDailyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HealMeDailyUITests
    dependencies:
      - target: HealMeDaily
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.antriksh.healmenow.uitests
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  # `xcodebuild ... -scheme HealMeDaily build` still just builds the app;
  # `-scheme HealMeDaily test` additionally runs the UI tests on a simulator.
  HealMeDaily:
    build:
      targets:
        HealMeDaily: all
        HealMeDailyUITests: [test]
    test:
      targets:
        - HealMeDailyUITests
