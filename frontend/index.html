<!doctype html>
<!--
  Vite entry shell for the HealMeDaily frontend. Dev: served on :5173
  (`make dev`); prod: built to dist/ and served by nginx (see Dockerfile).
  The manifest + apple-touch meta make the app Add-to-Home-Screen installable
  (PWA); the offline service worker (public/sw.js — app shell only, never
  health data) is registered from src/main.tsx in production builds only.
  viewport-fit=cover lets the mobile shell pad around iOS safe areas.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>HealMeDaily</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
