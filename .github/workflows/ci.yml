# Unit-level CI: lint, typecheck, tests, builds. The Medplum stack is not
# started here — end-to-end coverage is `make smoke` against a running stack.
name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx oxlint
      - run: npm test
      - run: npm run build

  bots:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-bots
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend-bots/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai-service/requirements.txt
      # OCR system deps used by the extraction tests
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr poppler-utils
      - run: pip install -r requirements.txt ruff
      - run: ruff check app tests ../scripts
      - run: ruff format --check app tests ../scripts
      - run: pytest -q

  pi-dispenser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # stdlib + httpx only; hardware libs are imported lazily on the Pi and
      # are not needed for the simulator-backed test suite.
      - run: pip install httpx pytest
      - run: pytest -q pi-dispenser/tests

  ios:
    # macOS runner: SwiftLint/SwiftFormat, the Kit's dose-engine parity tests
    # (they must stay green in lockstep with frontend/src/fhir.test.ts), an
    # unsigned simulator build, and the deterministic launch/sign-in UI tests.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen swiftlint swiftformat
      - run: swiftlint --strict
        working-directory: ios
      - run: swiftformat --lint ios
      - run: swift test
        working-directory: ios/HealMeDailyKit
      - name: Build app + run UI tests
        working-directory: ios
        run: |
          xcodegen generate
          xcodebuild -project HealMeDaily.xcodeproj -scheme HealMeDaily \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build
          # Pick whatever iPhone simulator the runner image ships (names drift
          # across Xcode versions) so the UI-test destination is never stale.
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; ds=json.load(sys.stdin)['devices']; print(next(d['udid'] for v in ds.values() for d in v if 'iPhone' in d['name']))")
          # Only the backend-free launch/sign-in tests run in CI; the live
          # sign-in flow self-skips without HMD_UITEST_* env.
          xcodebuild test -project HealMeDaily.xcodeproj -scheme HealMeDaily \
            -destination "id=$DEVICE_ID" CODE_SIGNING_ALLOWED=NO \
            -only-testing:HealMeDailyUITests/LaunchFlowUITests/testLaunchesToSignIn \
            -only-testing:HealMeDailyUITests/LaunchFlowUITests/testSignInDisabledUntilCredentialsEntered
