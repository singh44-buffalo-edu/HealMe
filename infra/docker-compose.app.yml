# Application containers on top of the Medplum stack (Phase 9 "containerize").
# Run combined:  docker compose -f infra/docker-compose.yml -f infra/docker-compose.app.yml up -d --build
# (or `make prod-up`). Requires a bootstrapped repo-root .env (make bootstrap).
# Note: the AI container claims :8000 — stop `make dev`'s uvicorn first.
#
# Port map (host): 8080 -> healmedaily-web (nginx serving the built frontend;
# dev uses Vite on :5173 instead) · 8000 -> healmedaily-ai (FastAPI). The
# Medplum ports (3000/8103/5432/6379) come from docker-compose.yml.
#
# REPO_ROOT quirk (why the /data/secrets mount works): the ai-service derives
# REPO_ROOT from its own file location; the container image puts the app at
# /srv/app, so REPO_ROOT resolves to / and relative paths like data/secrets
# become /data/secrets. Mounting host ../data/secrets there means dev
# (uvicorn on the host) and this container read/write the SAME BYOK keystore
# and per-feature AI routing files. Same trick for the /data/inbox watch dir.

services:
  healmedaily-ai:
    build: ../ai-service
    restart: unless-stopped
    # Run as the host user so the bind-mounted data/secrets (0700, owner-only)
    # stays writable: on macOS Docker Desktop a root container cannot write a
    # 0700 host dir owned by another uid, which 500s the BYOK key/settings
    # writes. Defaults to 0:0 (root, prior behavior) when the vars are unset;
    # set HMD_AI_UID/HMD_AI_GID in .env to your `id -u`/`id -g`.
    user: "${HMD_AI_UID:-0}:${HMD_AI_GID:-0}"
    env_file: ../.env
    environment:
      # Inside the compose network the server is reachable by service name,
      # not localhost. Everything else comes from .env.
      MEDPLUM_BASE_URL: 'http://medplum-server:8103/'
      AI_ALLOWED_ORIGINS: 'http://localhost:5173,http://localhost:8080'
      INGEST_WATCH_DIR: '/data/inbox'
    volumes:
      # Watched folder: files dropped in repo data/inbox are auto-imported
      - '../data/inbox:/data/inbox'
      # BYOK keys + per-feature AI routing (0600 files, gitignored). Shared
      # with the host so dev and container see the same AI settings.
      # In-container REPO_ROOT resolves to / (app lives at /srv/app).
      - '../data/secrets:/data/secrets'
    ports:
      # Loopback-only: the ai-service has NO authentication of its own (it holds
      # the owner's Medplum client-credentials token), so it must never be
      # reachable off-box. The browser reaches it via http://localhost:8000
      # (VITE_AI_SERVICE_URL) on the same machine; LAN peers cannot. Do not
      # change to '8000:8000' — that binds 0.0.0.0 and exposes the whole record.
      # All interfaces (was 127.0.0.1-only): the iPhone app reaches the
      # ai-service over LAN/Tailscale. Safe because every endpoint except
      # /health and /push/dispatch requires a live Medplum session
      # (AI_REQUIRE_AUTH gate, app/auth.py — designed for exactly this).
      - '8000:8000'
    depends_on:
      medplum-server:
        condition: service_healthy

  healmedaily-web:
    build: ../frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - healmedaily-ai
