# Medplum full stack (postgres + redis + server + app), pinned to 5.1.26.
#
# Based on Medplum's official docker-compose.full-stack.yml (CLAUDE.md §5)
# with local edits: pinned image tags, Google/recaptcha auth disabled, the
# registration-hardening note below. Start via `make up` (waits for the
# healthcheck — the FIRST boot does one-time setup and can take minutes).
#
# Port map (host):
#   3000  medplum-app     — built-in admin UI (resource browser, bot logs);
#                           never rebuild admin, use this
#   8103  medplum-server  — FHIR R4 API + OAuth + /healthcheck + /storage
#   5432  postgres        — the ENTIRE CDR lives here (no side database);
#                           scripts/backup.py pg_dumps it
#   6379  redis           — server cache/queues, no persistent app data
# The custom frontend (:5173 dev / :8080 prod) and ai-service (:8000) are NOT
# in this file — see docker-compose.app.yml and `make dev`.
#
# Phase 9 hardening note: open self-registration is DISABLED here
# (MEDPLUM_REGISTER_ENABLED below) — the owner account exists, so nobody on
# the LAN can self-register. FRESH INSTALLS ONLY: scripts/bootstrap.py needs
# the registration API once to create the first user, so temporarily set
# MEDPLUM_REGISTER_ENABLED to 'true' (or comment it out), run
# `make bootstrap`, then flip it back to 'false' and `docker compose up -d`.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped # for production usage, consider using 'always'
    environment:
      - POSTGRES_USER=medplum
      - POSTGRES_PASSWORD=medplum
    volumes:
      - medplum-postgres-data:/var/lib/postgresql/data
    command:
      # We use command line args instead of a postgres.conf to avoid additional setup out of the box
      - 'postgres'
      - '-c'
      - 'listen_addresses=*'
      - '-c'
      - 'statement_timeout=60000'
      - '-c'
      - 'default_transaction_isolation=REPEATABLE READ'
      - '-c'
      - 'shared_preload_libraries=pg_stat_statements,auto_explain'
    ports:
      # Loopback-only: password is the well-known dev default 'medplum'.
      # Medplum containers reach Postgres by service name on the compose
      # network; this host mapping is only for local tooling, not LAN peers.
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medplum']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped # for production usage, consider 'always'
    command: redis-server --requirepass medplum
    ports:
      # Loopback-only (see Postgres note above): dev-default password 'medplum'.
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'medplum', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Medplum server container
  medplum-server:
    image: medplum/medplum-server:5.1.26 # pinned (was :latest); bump deliberately per Upgrading-Server doc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8103:8103'
    command: ['env']
    environment:
      MEDPLUM_PORT: 8103
      MEDPLUM_BASE_URL: 'http://localhost:8103/'
      MEDPLUM_APP_BASE_URL: 'http://localhost:3000/'
      MEDPLUM_STORAGE_BASE_URL: 'http://localhost:8103/storage/'

      MEDPLUM_DATABASE_HOST: 'postgres'
      MEDPLUM_DATABASE_PORT: 5432
      MEDPLUM_DATABASE_DBNAME: 'medplum'
      MEDPLUM_DATABASE_USERNAME: 'medplum'
      MEDPLUM_DATABASE_PASSWORD: 'medplum'

      MEDPLUM_REDIS_HOST: 'redis'
      MEDPLUM_REDIS_PORT: 6379
      MEDPLUM_REDIS_PASSWORD: 'medplum'

      # File-based binary store INSIDE the container (uploaded PDFs/photos,
      # generated review PDFs). backup.py tars this dir; note attachment URLs
      # are rewritten to presigned /storage/ links on read (CLAUDE.md §9).
      MEDPLUM_BINARY_STORAGE: 'file:./binary/'
      MEDPLUM_SUPPORT_EMAIL: '\"Medplum\" <support@medplum.com>'
      # Google login + recaptcha intentionally disabled for this private single-user
      # instance (upstream compose ships demo keys; recaptcha would block API registration)
      MEDPLUM_GOOGLE_CLIENT_ID: ''
      MEDPLUM_GOOGLE_CLIENT_SECRET: ''
      MEDPLUM_RECAPTCHA_SITE_KEY: ''
      MEDPLUM_RECAPTCHA_SECRET_KEY: ''
      MEDPLUM_MAX_JSON_SIZE: '1mb'
      MEDPLUM_MAX_BATCH_SIZE: '50mb'
      MEDPLUM_BOT_LAMBDA_ROLE_ARN: ''
      MEDPLUM_BOT_LAMBDA_LAYER_NAME: 'medplum-bot-layer'
      # Bots run in-process (vmcontext) — no AWS Lambda. Server-level switch
      # only: each project ALSO needs the 'bots' feature (deploy_bots.py).
      MEDPLUM_VM_CONTEXT_BOTS_ENABLED: 'true'
      MEDPLUM_DEFAULT_BOT_RUNTIME_VERSION: 'vmcontext'
      # Dev-open CORS; tighten to explicit origins during hardening (CLAUDE.md §5).
      MEDPLUM_ALLOWED_ORIGINS: '*'
      MEDPLUM_INTROSPECTION_ENABLED: 'true'
      MEDPLUM_SHUTDOWN_TIMEOUT_MILLISECONDS: 30000
      # Phase 9 hardening (config key registerEnabled -> env MEDPLUM_REGISTER_ENABLED):
      # open self-registration is closed — the owner account already exists.
      # FRESH INSTALL EXCEPTION: bootstrap registers the owner through this
      # API exactly once, so set it to 'true' (or comment it out) for the
      # one-time `make bootstrap`, then back to 'false' and re-up.
      MEDPLUM_REGISTER_ENABLED: 'false'

    healthcheck:
      test:
        # We use Node's fetch for healthcheck because this image doesn't have a curl or wget installed
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://localhost:8103/healthcheck").then(r => r.json()).then(console.log).catch(() => { process.exit(1); })',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Medplum app container (web UI)
  medplum-app:
    image: medplum/medplum-app:5.1.26 # pinned (was :latest); keep in lockstep with medplum-server
    restart: unless-stopped
    depends_on:
      medplum-server:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  medplum-postgres-data:
